name: Generate Calendar

on:
  push:
    branches:
      - main
  schedule:
    - cron: '32 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq imagemagick

      - name: Prepare Output Directory
        run: |
          mkdir -p ./artwork-of-the-day

      - name: Generate landscape
        run: |
          ./aic.sh -vv -q ./queries/random-landscape.json > ./artwork-of-the-day/landscape.jpg

      - name: Generate oil painting
        run: |
          ./aic.sh -vv -q ./queries/random-oil-painting.json > ./artwork-of-the-day/oil-painting.jpg

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./artwork-of-the-day

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
